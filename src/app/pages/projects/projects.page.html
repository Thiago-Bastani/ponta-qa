<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Ponta QA</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (projects.length === 0) {
    <div class="empty-state">
      <ion-icon name="cube-outline"></ion-icon>
      <ion-text color="medium">
        <p>Nenhum projeto ainda.<br>Toque em <strong>+</strong> para criar.</p>
      </ion-text>
    </div>
  }

  <ion-list>
    @for (project of projects; track project.id) {
      <ion-item-sliding>
        <ion-item button detail (click)="openProject(project)">
          <ion-icon name="cube-outline" slot="start" color="primary"></ion-icon>
          <ion-label>
            <h2>{{ project.name }}</h2>
            <p>{{ project.baseUrl }}</p>
            @if (project.description) {
              <p class="desc">{{ project.description }}</p>
            }
          </ion-label>
          <ion-badge slot="end" color="medium">
            {{ project.endpoints.length }}
          </ion-badge>
        </ion-item>
        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="confirmDelete(project, $event)">
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    }
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="openModal()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-modal [isOpen]="showModal" (didDismiss)="closeModal()">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-buttons slot="start">
            <ion-button (click)="closeModal()">Cancelar</ion-button>
          </ion-buttons>
          <ion-title>Novo Projeto</ion-title>
          <ion-buttons slot="end">
            <ion-button strong (click)="createProject()" [disabled]="!newProject.name || !newProject.baseUrl">
              Criar
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-list inset>
          <ion-item>
            <ion-input
              label="Nome *"
              labelPlacement="stacked"
              [(ngModel)]="newProject.name"
              placeholder="Minha API"
              autocomplete="off"
            ></ion-input>
          </ion-item>
          <ion-item>
            <ion-input
              label="Base URL *"
              labelPlacement="stacked"
              [(ngModel)]="newProject.baseUrl"
              placeholder="https://api.exemplo.com"
              autocomplete="off"
              inputmode="url"
            ></ion-input>
          </ion-item>
          <ion-item>
            <ion-input
              label="Descrição"
              labelPlacement="stacked"
              [(ngModel)]="newProject.description"
              placeholder="Opcional"
              autocomplete="off"
            ></ion-input>
          </ion-item>
        </ion-list>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
